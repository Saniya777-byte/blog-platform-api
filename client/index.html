<!DOCTYPE html>
<html>
<head>
    <title>Blog Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1 class="main-title">Blog Platform</h1>

    <div class="card">
        <h2>Search Posts</h2>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by title or description">
            <button onclick="searchPosts()" class="btn primary">Search</button>
            <button onclick="loadPosts()" class="btn secondary">Reset</button>
        </div>
    </div>

    <div class="card">
        <h2>Create Post</h2>
        <form id="postForm">
            <input type="text" id="title" placeholder="Title" required />
            <textarea id="desc" placeholder="Description" required></textarea>
            <select id="tagSelect"></select>
            <input type="file" id="image" />
            <button type="submit" class="btn primary full-width">Create Post</button>
        </form>
    </div>

    <h2 class="section-title">All Posts</h2>
    <div id="posts" class="posts-grid"></div>

</div>

<script src="script.js"></script>
</body>
</html>
